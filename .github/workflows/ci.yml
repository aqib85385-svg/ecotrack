name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-size: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint checks
      run: npm run lint

    - name: Run tests with coverage assertions
      run: npm run test:coverage

    - name: Build frontend & backend
      run: npm run build
